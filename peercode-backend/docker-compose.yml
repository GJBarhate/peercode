version: '3.9'

services:
  backend:
    build: .
    env_file: .env
    ports:
      - '5000:5000'
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - peercode-net
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    networks:
      - peercode-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  peercode-net:
    driver: bridge
